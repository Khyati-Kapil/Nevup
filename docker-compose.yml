services:
  mock-api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npx @stoplight/prism-cli mock nevup_openapi.yaml --host 0.0.0.0 --port 4010"
    ports:
      - "4010:4010"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - VITE_API_BASE_URL=http://localhost:4010
      - VITE_DEMO_USER_ID=f412f236-4edc-47a2-8f54-8763a6ed2ce8
      - VITE_DEMO_SESSION_ID=session-1
    depends_on:
      - mock-api
    ports:
      - "4173:4173"

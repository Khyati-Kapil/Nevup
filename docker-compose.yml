services:
  mock-api:
    build:
      context: ./mock-api
      dockerfile: Dockerfile
    environment:
      - PORT=4010
      - SEED_FILE=/app/data/nevup_seed_dataset.csv
    volumes:
      - ./data:/app/data:ro
    ports:
      - "4010:4010"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - VITE_API_BASE_URL=http://localhost:4010
      - VITE_DEMO_USER_ID=f412f236-4edc-47a2-8f54-8763a6ed2ce8
      - VITE_DEMO_SESSION_ID=4f39c2ea-8687-41f7-85a0-1fafd3e976df
    depends_on:
      - mock-api
    ports:
      - "4173:4173"
